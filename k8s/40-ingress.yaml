# AWS Application Load Balancer fronting the frontend Service. The
# Load Balancer Controller (installed via Helm — see README) reads the
# annotations and provisions a real ALB.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mern-ingress
  namespace: mern
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /nginx-health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/success-codes: "200"
    # When you have a cert in ACM, uncomment to enable HTTPS + redirect:
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
    - http:
        paths:
          # All HTTP routing is handled by the frontend's nginx (it
          # proxies /record and /healthcheck to the backend Service).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
