# Bootstrap credentials for the in-cluster MongoDB. In real environments
# you'd source these from AWS Secrets Manager via External Secrets, or
# replace MongoDB with Atlas/DocumentDB altogether — see README.
#
# Replace the values below with `kubectl create secret generic ...
# --dry-run=client -o yaml | kubeseal` (or use SealedSecrets) before
# committing for real.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: mern
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "root"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_IN_PROD"
---
# The backend pulls ATLAS_URI from this Secret. Stored separately so
# rotating DB creds doesn't require redeploying the backend image.
apiVersion: v1
kind: Secret
metadata:
  name: backend-config
  namespace: mern
type: Opaque
stringData:
  ATLAS_URI: "mongodb://root:CHANGE_ME_IN_PROD@mongodb:27017/sample_training?authSource=admin"
