apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mern
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - port: 5050
      targetPort: 5050
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mern
  labels:
    app: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Spread the two replicas across nodes/zones when possible — protects
      # against node loss without requiring three replicas.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend
      containers:
        - name: backend
          image: BACKEND_IMAGE_PLACEHOLDER     # replaced by CI: ${ECR}/${repo}/backend:${sha}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
              name: http
          env:
            - name: ATLAS_URI
              valueFrom:
                secretKeyRef:
                  name: backend-config
                  key: ATLAS_URI
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /healthcheck/
              port: 5050
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthcheck/
              port: 5050
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: mern
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
