# PodDisruptionBudgets: don't let voluntary disruptions (node upgrades,
# scale-ins) take both replicas down at once.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend
  namespace: mern
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: mern
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
