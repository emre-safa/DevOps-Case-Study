# Resolves the backend Service name dynamically — same config works in
# docker-compose (host "backend") and Kubernetes (Service "backend").
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: any unknown path → index.html so React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy. The upstream host is read from $BACKEND_HOST
    # (defaults to "backend") and resolved at request time so nginx doesn't
    # die at boot when the backend pod isn't up yet.
    location /record/ {
        proxy_pass http://backend:5050/record/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /record {
        proxy_pass http://backend:5050/record;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /healthcheck/ {
        proxy_pass http://backend:5050/healthcheck/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    # Liveness/readiness target for the frontend itself
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
