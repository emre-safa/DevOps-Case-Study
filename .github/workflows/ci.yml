name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  client:
    name: Client (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mern-project/client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: mern-project/client/package-lock.json

      - run: npm ci
      - run: npm run build --if-present
      - name: Run unit tests
        run: CI=true npm test --if-present -- --watchAll=false --passWithNoTests

  server:
    name: Server (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mern-project/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: mern-project/server/package-lock.json

      - run: npm ci
      - name: Syntax check
        run: node --check server.mjs
      - name: Run unit tests
        run: |
          # `npm init`'s default test script is `exit 1`. Skip it; only run
          # `npm test` when a real test framework is wired up.
          if grep -q 'no test specified' package.json; then
            echo "ℹ️  No real tests defined in package.json — skipping."
          else
            npm test
          fi

  python:
    name: Python ETL (lint + import check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-project/requirements.txt

      - run: pip install -r requirements.txt
      - name: Compile check
        run: python -m py_compile ETL.py
      - name: Lint
        run: |
          pip install ruff
          ruff check ETL.py || true   # informational only

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [client, server, python]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: mern-project/client
          push: false
          tags: mern-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: mern-project/server
          push: false
          tags: mern-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ETL image
        uses: docker/build-push-action@v6
        with:
          context: python-project
          push: false
          tags: python-etl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
